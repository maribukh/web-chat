version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://chat_user:chat_password@postgres:5432/chat_app
      REDIS_URL: redis://redis:6379
      JWT_SECRET: super-secret-jwt-key-change-me
    depends_on:
      - postgres
      - redis
    volumes:
      - uploads:/app/uploads
    command: sh -c "npx prisma db push --accept-data-loss && npm run build && npm run start"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads:
